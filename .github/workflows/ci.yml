name: AcreHiveMind CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
    branches: [ "main" ]

jobs:
  enforce-version-bump:
    name: Enforce VERSION Bump
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify VERSION file is bumped
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const version = fs.readFileSync('VERSION', 'utf8').trim();
            const currentTag = `v${version}`;
            
            let latestTag = '';
            try {
              const { data: refs } = await github.rest.git.listMatchingRefs({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: 'tags/v'
              });
              if (refs.length > 0) {
                const tags = refs.map(r => r.ref.replace('refs/tags/', ''));
                latestTag = tags.sort((a,b) => a.localeCompare(b, undefined, {numeric:true}))[tags.length-1];
              }
            } catch(e) {}
            
            if (latestTag === currentTag) {
              core.setFailed(`The VERSION file (${version}) is identical to the latest software tag (${latestTag}). Please bump the version in the VERSION file before merging.`);
            } else {
              console.log(`Version check passed! Latest tag is ${latestTag}, PR version is ${currentTag}`);
            }

  test-frontend:
    name: Frontend Tests (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run Vitest
        run: npm run test

  test-backend:
    name: Backend Tests (Cargo)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Install Tauri OS Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - name: Run Cargo Test
        working-directory: ./src-tauri
        run: cargo test
