name: Release

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup Miniconda (Fast Prebuilt GDAL)
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
      - name: Install GDAL via Conda
        shell: pwsh
        run: |
          conda create -y -n gdal-env -c conda-forge python=3.10 gdal=3.7.0
          $condaPath = conda info --base
          $libPath = "$condaPath\envs\gdal-env\Library\lib"
          $incPath = "$condaPath\envs\gdal-env\Library\include"
          echo "GDAL_LIB_DIR=$libPath" | Out-File -FilePath $env:GITHUB_ENV -Append
          echo "GDAL_INCLUDE_DIR=$incPath" | Out-File -FilePath $env:GITHUB_ENV -Append
          echo "GDAL_VERSION=3.7.0" | Out-File -FilePath $env:GITHUB_ENV -Append
          echo "GDAL_NO_PKG_CONFIG=1" | Out-File -FilePath $env:GITHUB_ENV -Append
          if (Test-Path "$libPath\gdal.lib") {
              if (-not (Test-Path "$libPath\gdal_i.lib")) {
                  Copy-Item "$libPath\gdal.lib" "$libPath\gdal_i.lib"
              }
          }
          Remove-Item -Force src-tauri\.cargo\config.toml -ErrorAction SilentlyContinue

      - name: Determine Next Version
        id: version
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const version = fs.readFileSync('VERSION', 'utf8').trim();
            core.setOutput('next_version', `v${version}`);

      - name: Ensure target directory exists for DLL copy
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path src-tauri\target\release
          Copy-Item src-tauri\dependencies\*.dll src-tauri\target\release\ -ErrorAction SilentlyContinue

      - name: Build and Release Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ steps.version.outputs.next_version }}
          releaseName: "Release ${{ steps.version.outputs.next_version }}"
          releaseBody: "Automated release triggered by merging into main."
          releaseDraft: false
          prerelease: false
